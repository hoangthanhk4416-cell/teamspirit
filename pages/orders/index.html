<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" sizes="any">
  <title>주문·배송 조회 | TEAMSPIRIT-kr</title>
  <meta name="description" content="TEAMSPIRIT-kr 주문번호 또는 전화번호로 주문 제작 및 배송 상태를 확인하세요.">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://teamspirit.co.kr/pages/orders/">
  <link rel="stylesheet" href="../common.css">
  <style>
    :root{color-scheme:light;--bg:#f4f6f5;--panel:#fff;--ink:#10201d;--muted:#66736f;--line:#dce4e1;--accent:#0f766e;--soft:#d9f4ef}
    *{box-sizing:border-box}
    body{background:var(--bg);color:var(--ink)}
    .tracking-main{min-height:calc(100vh - 72px);padding:56px 20px 90px}
    .tracking-shell{width:min(820px,100%);margin:auto}
    .tracking-intro{text-align:center;margin-bottom:28px}
    .tracking-icon{width:68px;height:68px;margin:auto;display:grid;place-items:center;border-radius:22px;background:var(--soft);font-size:34px}
    .tracking-intro h1{margin:16px 0 8px;font-size:clamp(28px,5vw,42px)}
    .tracking-intro p{margin:0;color:var(--muted);line-height:1.7}
    .tracking-panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:26px;box-shadow:0 18px 55px rgba(15,35,30,.08)}
    .tracking-form{display:grid;grid-template-columns:1fr 150px;gap:10px}
    .tracking-field{display:grid;gap:7px}
    .tracking-field label{font-size:13px;font-weight:900}
    .tracking-field input{width:100%;height:52px;border:1px solid #bfcac6;border-radius:10px;padding:0 15px;background:var(--panel);color:var(--ink);font-size:16px}
    .tracking-field input:focus{outline:3px solid #b9eee5;border-color:var(--accent)}
    .tracking-submit{align-self:end;height:52px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-size:15px;font-weight:900}
    .tracking-help{margin:12px 0 0;color:var(--muted);font-size:12px;line-height:1.6}
    .tracking-message{min-height:22px;margin:18px 0 0;color:#a61b1b;text-align:center;font-size:14px}
    .tracking-message.loading{color:var(--accent)}
    .tracking-results{display:grid;gap:16px;margin-top:22px}
    .tracking-order{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 12px 35px rgba(15,35,30,.06)}
    .order-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding-bottom:16px;border-bottom:1px solid var(--line)}
    .order-head small,.order-meta span{display:block;color:var(--muted);font-size:12px}
    .order-code{display:flex;align-items:center;gap:8px;margin-top:4px}
    .order-code strong{font-size:18px;word-break:break-all}
    .copy-code{border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink);padding:7px 9px;font-weight:800}
    .status-badge{flex:0 0 auto;border-radius:999px;padding:8px 12px;background:var(--soft);color:#075b55;font-size:12px;font-weight:900}
    .status-badge.cancelled{background:#fde2e2;color:#9a1616}
    .order-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
    .order-meta strong{display:block;margin-top:4px;font-size:14px}
    .order-summary{margin:0;padding:13px 15px;border-radius:10px;background:var(--bg);white-space:pre-line;line-height:1.6;font-size:13px}
    .order-notice,.customer-notice{margin-top:13px;padding:14px 15px;border-radius:10px;line-height:1.6}
    .order-notice{background:#eef8f6;border:1px solid #cce9e4}
    .customer-notice{background:#fff8dd;border:1px solid #f1d77a}
    .order-notice strong,.customer-notice strong{display:block;margin-bottom:4px;font-size:12px}
    .order-notice p,.customer-notice p{margin:0;font-size:13px;white-space:pre-line}
    .status-steps{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:20px}
    .status-step{text-align:center;color:#8b9692;font-size:10px;line-height:1.35}
    .status-step:before{content:"";display:block;height:6px;margin-bottom:7px;border-radius:999px;background:#dfe5e3}
    .status-step.done,.status-step.current{color:var(--accent);font-weight:900}
    .status-step.done:before,.status-step.current:before{background:var(--accent)}
    .privacy-note{text-align:center;color:var(--muted);font-size:11px;line-height:1.6;margin:20px auto 0}
    @media(max-width:620px){
      .tracking-main{min-height:calc(100vh - 64px);padding:30px 13px 65px}
      .tracking-panel,.tracking-order{padding:16px;border-radius:14px}
      .tracking-form{grid-template-columns:1fr}
      .tracking-submit{width:100%}
      .order-head{align-items:center}
      .order-meta{grid-template-columns:1fr 1fr}
      .order-meta>div:first-child{grid-column:1/-1}
      .status-steps{overflow-x:auto;grid-template-columns:repeat(6,94px);padding-bottom:5px}
    }
    @media(prefers-color-scheme:dark){
      :root{color-scheme:dark;--bg:#07110f;--panel:#101a18;--ink:#f2f7f5;--muted:#a1ada9;--line:#2d3a36;--accent:#29b5a6;--soft:#153f39}
      .tracking-field input{border-color:#43524d}
      .tracking-submit{color:#061411}
      .order-summary{background:#0b1412}
      .order-notice{background:#102a26;border-color:#285149}
      .customer-notice{background:#2b2612;border-color:#625522}
      .copy-code{border-color:#40504b}
    }
  </style>
</head>
<body>
  <header class="page-head">
    <a class="brand" href="/" aria-label="TEAMSPIRIT-kr 홈페이지">TEAMSPIRIT-kr</a>
    <a class="back" href="/">← 홈으로</a>
  </header>
  <main class="tracking-main">
    <div class="tracking-shell">
      <section class="tracking-intro">
        <div class="tracking-icon" aria-hidden="true">📦</div>
        <h1>주문·배송 조회</h1>
        <p>주문 완료 시 받은 주문번호 또는 주문할 때 입력한 전화번호로<br>제작 및 배송 상태를 확인할 수 있습니다.</p>
      </section>
      <section class="tracking-panel">
        <form class="tracking-form" id="orderLookupForm">
          <div class="tracking-field">
            <label for="orderLookupInput">주문번호 또는 전화번호</label>
            <input id="orderLookupInput" name="lookup" autocomplete="off" inputmode="text" placeholder="TS-20260723-ABC123 또는 010-1234-5678" required>
          </div>
          <button class="tracking-submit" type="submit">주문 조회하기</button>
        </form>
        <p class="tracking-help">전화번호는 주문 시 입력한 번호와 정확히 일치해야 합니다. 고객 보호를 위해 주소와 이름은 표시하지 않습니다.</p>
        <p class="tracking-message" id="trackingMessage" role="status" aria-live="polite"></p>
      </section>
      <section class="tracking-results" id="trackingResults" aria-live="polite"></section>
      <p class="privacy-note">조회가 되지 않거나 주문 정보가 다르면 KakaoTalk 또는 Instagram으로 문의해 주세요.</p>
    </div>
  </main>
  <script src="/assets/order-config.js"></script>
  <script src="/assets/order-tracking.js?v=20260724-3" defer></script>
</body>
</html>
