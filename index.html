  function footer(){return `<footer class="footer"><div class="wrap foot"><div><h3>${data.brand}</h3><p>${data.footerText}</p><p>Copyright ${data.brand}. All rights reserved.</p></div><div><h4>고객센터</h4><h3>${data.footerPhone}</h3><p>평일 10:00-17:00</p></div><div><h4>커뮤니티</h4><p>NOTICE<br>EVENT<br>Q&A<br>REVIEW</p></div></div></footer>`}
  function render(){
    clearInterval(heroTimer);
    clearInterval(kitTimer);
    const productMatch=location.hash.match(/product\/(.+)/),categoryMatch=location.hash.match(/category\/([^/?]+)/);productMatch?detail(productMatch[1]):categoryMatch?categoryPage(categoryMatch[1]):home();updateCartCount();window.scrollTo(0,0);

      const a=document.createElement("a");
      a.className="edit-page-link";
      a.href="/editor";
      a.textContent="이 페이지 편집";
      document.body.appendChild(a);
    }

  addEventListener("keydown",event=>{if(event.key==="Escape")closeContactChoice()});

    setInterval(async()=>{
      try{
        const next=await fetch("/api/site",{cache:"no-store"}).then(r=>r.json());

        if(snapshot!==dataSnapshot){data=next;dataSnapshot=snapshot;render();}
      }catch(_error){}

})();
